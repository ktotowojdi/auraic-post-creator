name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review this pull request for bugs and CLAUDE.md compliance.

            Steps:
            1. Read CLAUDE.md if it exists in the repo root using the Read tool.
            2. Use the Read tool to read the changed files.
            3. Check for bugs, logic errors, security issues, and CLAUDE.md violations.
            4. Score each issue 0-100 confidence. Only report issues at 80+.
            5. Filter out: pre-existing issues, linter/type issues, nitpicks, intentional changes.

            Do NOT use Bash or shell commands. Use only Read, Grep, and Glob tools.
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
          show_full_output: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          OUTPUT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "No output file found, skipping"
            exit 0
          fi

          echo "Output file found, size: $(wc -c < "$OUTPUT_FILE") bytes"

          # Use python to parse potentially multi-line JSON
          BODY_FILE=$(mktemp)
          python3 -c "
          import json, sys
          with open('$OUTPUT_FILE') as f:
              content = f.read()
          # Try parsing as JSON array or single object first
          try:
              data = json.loads(content)
              if isinstance(data, list):
                  items = data
              elif isinstance(data, dict):
                  items = [data]
              else:
                  items = []
          except json.JSONDecodeError:
              # Try NDJSON
              items = []
              for line in content.strip().split('\n'):
                  line = line.strip()
                  if line:
                      try:
                          items.append(json.loads(line))
                      except json.JSONDecodeError:
                          pass
          # Find last result
          result = ''
          for item in items:
              if isinstance(item, dict) and item.get('type') == 'result' and item.get('result'):
                  result = item['result']
          if result:
              print(result)
          " > "$BODY_FILE" 2>/dev/null

          RESULT_SIZE=$(wc -c < "$BODY_FILE")
          echo "Result size: $RESULT_SIZE bytes"

          if [ "$RESULT_SIZE" -lt 10 ]; then
            echo "No meaningful review result found"
            rm -f "$BODY_FILE"
            exit 0
          fi

          # Prepend marker and append footer
          FINAL_FILE=$(mktemp)
          printf '<!-- claude-code-review -->\n\n' > "$FINAL_FILE"
          cat "$BODY_FILE" >> "$FINAL_FILE"
          printf '\n\n---\n' >> "$FINAL_FILE"
          printf '🤖 Generated with [Claude Code](https://claude.ai/code)\n' >> "$FINAL_FILE"

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$FINAL_FILE"

          rm -f "$BODY_FILE" "$FINAL_FILE"
