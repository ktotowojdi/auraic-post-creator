name: Daily Claude Code Review

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC
  workflow_dispatch:       # allow manual runs

permissions:
  contents: read
  issues: write

jobs:
  daily-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get recent changes
        id: changes
        run: |
          DIFF=$(git log --since="24 hours ago" --oneline 2>/dev/null || echo "")
          if [ -z "$DIFF" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude review
        if: steps.changes.outputs.has_changes == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review all code changes from the last 24 hours (use git log --since="24 hours ago" -p).
            Focus on:
            - Code quality and best practices
            - Potential bugs or security issues
            - Performance concerns
            Provide a concise summary with actionable feedback.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create issue with review
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.claude.outputs.markdown_result || steps.claude.outputs.result || 'No review output' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `### Codzienny code review (Claude)\n\n${process.env.REVIEW_BODY}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily code review – ${new Date().toISOString().slice(0,10)}`,
              body,
            });
            core.info(`Created issue #${issue.data.number}`);
